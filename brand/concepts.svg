<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" width="760" height="280">
  <rect width="760" height="280" fill="#FBFAF6"/>
  <defs>
    <style>.lbl{font-family:'DejaVu Sans',sans-serif;font-size:14px;fill:#5C544A;}</style>
    <marker id="b-ah" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" refX="3" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#E8820C"/></marker>
  </defs>

  <!-- ================= A: modular grid-letter "V" ================= -->
  <g transform="translate(40,40) scale(2.2)">
    <rect width="64" height="64" rx="15" fill="#1A1612"/>
    <!-- faint full grid of cells -->
    <g fill="#FBFAF6" opacity="0.16">
      <!-- 5x5 -->
      <g><rect x="11" y="11" width="6" height="6" rx="1.5"/><rect x="20" y="11" width="6" height="6" rx="1.5"/><rect x="29" y="11" width="6" height="6" rx="1.5"/><rect x="38" y="11" width="6" height="6" rx="1.5"/><rect x="47" y="11" width="6" height="6" rx="1.5"/></g>
      <g><rect x="11" y="20" width="6" height="6" rx="1.5"/><rect x="20" y="20" width="6" height="6" rx="1.5"/><rect x="29" y="20" width="6" height="6" rx="1.5"/><rect x="38" y="20" width="6" height="6" rx="1.5"/><rect x="47" y="20" width="6" height="6" rx="1.5"/></g>
      <g><rect x="11" y="29" width="6" height="6" rx="1.5"/><rect x="20" y="29" width="6" height="6" rx="1.5"/><rect x="29" y="29" width="6" height="6" rx="1.5"/><rect x="38" y="29" width="6" height="6" rx="1.5"/><rect x="47" y="29" width="6" height="6" rx="1.5"/></g>
      <g><rect x="11" y="38" width="6" height="6" rx="1.5"/><rect x="20" y="38" width="6" height="6" rx="1.5"/><rect x="29" y="38" width="6" height="6" rx="1.5"/><rect x="38" y="38" width="6" height="6" rx="1.5"/><rect x="47" y="38" width="6" height="6" rx="1.5"/></g>
      <g><rect x="11" y="47" width="6" height="6" rx="1.5"/><rect x="20" y="47" width="6" height="6" rx="1.5"/><rect x="29" y="47" width="6" height="6" rx="1.5"/><rect x="38" y="47" width="6" height="6" rx="1.5"/><rect x="47" y="47" width="6" height="6" rx="1.5"/></g>
    </g>
    <!-- "V" traced in marigold cells -->
    <g fill="#E8820C">
      <rect x="11" y="11" width="6" height="6" rx="1.5"/><rect x="11" y="20" width="6" height="6" rx="1.5"/>
      <rect x="20" y="29" width="6" height="6" rx="1.5"/><rect x="20" y="38" width="6" height="6" rx="1.5"/>
      <rect x="29" y="47" width="6" height="6" rx="1.5"/>
      <rect x="38" y="38" width="6" height="6" rx="1.5"/><rect x="38" y="29" width="6" height="6" rx="1.5"/>
      <rect x="47" y="20" width="6" height="6" rx="1.5"/><rect x="47" y="11" width="6" height="6" rx="1.5"/>
    </g>
  </g>
  <text class="lbl" x="40" y="262">A · modular grid "V"</text>

  <!-- ================= B: route / trace across the grid ================= -->
  <g transform="translate(300,40) scale(2.2)">
    <rect width="64" height="64" rx="15" fill="#1A1612"/>
    <g fill="#FBFAF6" opacity="0.30">
      <circle cx="16" cy="16" r="2.2"/><circle cx="32" cy="16" r="2.2"/><circle cx="48" cy="16" r="2.2"/>
      <circle cx="16" cy="32" r="2.2"/><circle cx="32" cy="32" r="2.2"/><circle cx="48" cy="32" r="2.2"/>
      <circle cx="16" cy="48" r="2.2"/><circle cx="32" cy="48" r="2.2"/><circle cx="48" cy="48" r="2.2"/>
    </g>
    <polyline points="16,48 16,32 32,32 32,16 48,16" fill="none" stroke="#E8820C" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="16" cy="48" r="3.8" fill="#E8820C"/>
    <circle cx="48" cy="16" r="4" fill="#27B3A3"/>
  </g>
  <text class="lbl" x="300" y="262">B · route across grid</text>

  <!-- ================= C: vector field (flow) ================= -->
  <g transform="translate(560,40) scale(2.2)">
    <rect width="64" height="64" rx="15" fill="#1A1612"/>
    <g stroke="#FBFAF6" stroke-width="2.4" stroke-linecap="round" opacity="0.28">
      <line x1="16" y1="48" x2="22" y2="46"/><line x1="32" y1="48" x2="38" y2="44"/><line x1="48" y1="48" x2="53" y2="42"/>
      <line x1="16" y1="32" x2="22" y2="29"/>
      <line x1="16" y1="16" x2="21" y2="13"/>
    </g>
    <!-- active marigold vectors curving up-right -->
    <g stroke="#E8820C" stroke-width="4" stroke-linecap="round">
      <line x1="32" y1="32" x2="39" y2="27" marker-end="url(#b-ah)"/>
      <line x1="48" y1="32" x2="54" y2="24" marker-end="url(#b-ah)"/>
      <line x1="32" y1="16" x2="40" y2="12" marker-end="url(#b-ah)"/>
    </g>
    <circle cx="48" cy="16" r="3" fill="#27B3A3"/>
  </g>
  <text class="lbl" x="560" y="262">C · vector field</text>
</svg>
